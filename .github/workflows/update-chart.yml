name: Update Bitcoin chart

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - run: python update_bitcoinity_data.py

      - run: cp bitcoinity_data.txt site/

      - run: python Bitcoinity_LongtermTrendCharts.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      
      - uses: actions/upload-artifact@v5
        with:
          name: bitcoinity-data
          path: bitcoinity_data.txt

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - uses: actions/deploy-pages@v4
